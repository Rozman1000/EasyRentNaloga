services:
  web-server:
    build:
      context: .
      # POPRAVEK: dejanski imeni map na disku sta "BackEnd" in "FrontEnd"
      # (ne "js-Backend"/"html-frontend", kot je predpostavljala prejšnja
      # različica) — dockerfile pot mora točno ustrezati velikosti črk!
      dockerfile: BackEnd/Dockerfile
    container_name: web-server-js
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db-database
      - DB_USER=postgres
      - DB_PASSWORD=testnosuperskrpno
      - DB_NAME=Easyrentbaza
      # POPRAVEK: dodan JWT_SECRET - brez tega server.js uporablja privzeto vrednost
      # kar ni varno. V produkciji zamenjaj z dolgim naključnim nizom.
      - JWT_SECRET=zamenjaj-z-dolgim-nakljucnim-nizom-v-produkciji
      # Geocoding za turnirji.html — vstavi svoj Google Maps API ključ
      - GOOGLE_API_KEY=tukaj_vstavi_svoj_api_kljuc
    depends_on:
      db-database:
        condition: service_healthy
    networks:
      - turnir-network
 
  db-database:
    image: postgres:15-alpine
    container_name: db-database
    hostname: db-database
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=testnosuperskrpno
      - POSTGRES_DB=Easyrentbaza
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # POPRAVEK: pot popravljena na dejansko mapo "BackEnd" (glej opombo
      # zgoraj) in dejansko ime datoteke "Easyrentbaza.sql".
      - ./BackEnd/Easyrentbaza.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      # POPRAVEK: preverjalo je bazo "testna_baza", dejanska baza pa se
      # imenuje "Easyrentbaza" (glej POSTGRES_DB spodaj) — neskladje.
      test: ["CMD-SHELL", "pg_isready -U postgres -d Easyrentbaza"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - turnir-network
 
volumes:
  pgdata:
 
networks:
  turnir-network:
    driver: bridge